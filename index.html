<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javier Solis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fafafa;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.2rem;
      color: #888;
    }
    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }
    .links a {
      color: #fafafa;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border: 1px solid #333;
      border-radius: 6px;
      transition: border-color 0.2s;
    }
    .links a:hover {
      border-color: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Javier Solis</h1>
    <p>Software Engineer</p>
    <div class="links">
      <a href="https://github.com/javisolispro" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/" target="_blank">LinkedIn</a>
    </div>
  </div>
</body>
</html>
